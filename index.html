<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Steering Progress Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">.steering</p>
          <h1>LV3 実装進捗</h1>
        </div>
        <div class="actions">
          <button id="resetButton" type="button">スキャン</button>
        </div>
      </header>

      <nav class="viewTabs" aria-label="表示切替">
        <button id="cardsViewButton" class="isActive" type="button">カード</button>
        <button id="treeViewButton" type="button">機能階層</button>
      </nav>

      <section class="summaryGrid" aria-label="進捗サマリー">
        <article>
          <span id="totalCount">0</span>
          <p>LV3</p>
        </article>
        <article>
          <span id="activeCount">0</span>
          <p>実装中</p>
        </article>
        <article>
          <span id="assignedCount">0</span>
          <p>担当者あり</p>
        </article>
        <article>
          <span id="avgPhase">0</span>
          <p>平均Phase</p>
        </article>
      </section>

      <section class="toolbar" aria-label="絞り込み">
        <div class="searchWrap">
          <span>検索</span>
          <input id="searchInput" type="search" placeholder="REC001 / 渡部 / schema..." />
        </div>
        <select id="ownerFilter" aria-label="担当者で絞り込み">
          <option value="">担当者: すべて</option>
        </select>
        <select id="phaseFilter" aria-label="Phaseで絞り込み">
          <option value="">Phase: すべて</option>
          <option value="0">Phase 0</option>
          <option value="1">Phase 1</option>
          <option value="2">Phase 2</option>
          <option value="3">Phase 3</option>
          <option value="4">Phase 4</option>
          <option value="5">Phase 5</option>
          <option value="6">Phase 6</option>
          <option value="7">Phase 7</option>
          <option value="8">Phase 8</option>
          <option value="9">Phase 9</option>
          <option value="10">Phase 10</option>
        </select>
      </section>

      <section id="cardsView" class="workspace">
        <section class="listPanel" aria-label="LV3一覧">
          <div id="cardList" class="cardList"></div>
        </section>

        <aside class="detailPanel" aria-label="詳細">
          <div id="emptyDetail" class="emptyDetail">
            <p>「スキャン」でデスクトップの .steering-shared フォルダを選択すると、全担当者の進捗を収集します。</p>
          </div>

          <form id="detailForm" class="detailForm" hidden>
            <div class="detailHeader">
              <div>
                <p id="detailCode" class="eyebrow"></p>
                <h2 id="detailTitle"></h2>
              </div>
              <span id="detailStatus" class="statusBadge"></span>
            </div>

            <label>
              担当者
              <input id="ownerInput" type="text" placeholder="例: 渡部" />
            </label>

            <label>
              FR 完了済みPhase
              <select id="phaseInput">
                <option value="-1">未着手</option>
                <option value="0">Phase 0</option>
                <option value="1">Phase 1</option>
                <option value="2">Phase 2</option>
                <option value="3">Phase 3</option>
                <option value="4">Phase 4</option>
                <option value="5">Phase 5</option>
                <option value="6">Phase 6</option>
                <option value="7">Phase 7</option>
                <option value="8">Phase 8</option>
                <option value="9">Phase 9</option>
                <option value="10">Phase 10</option>
              </select>
            </label>

            <label>
              BFF 完了済みPhase
              <select id="bffPhaseInput">
                <option value="-1">未着手</option>
                <option value="0">Phase 0</option>
                <option value="1">Phase 1</option>
                <option value="2">Phase 2</option>
                <option value="3">Phase 3</option>
                <option value="4">Phase 4</option>
                <option value="5">Phase 5</option>
                <option value="6">Phase 6</option>
                <option value="7">Phase 7</option>
                <option value="8">Phase 8</option>
                <option value="9">Phase 9</option>
                <option value="10">Phase 10</option>
              </select>
            </label>

            <label>
              ステータス
              <select id="statusInput">
                <option value="not-started">未着手</option>
                <option value="implement">実装中</option>
                <option value="blocked">ブロック中</option>
                <option value="review">レビュー待ち</option>
                <option value="done">完了</option>
              </select>
            </label>

            <label>
              メモ
              <textarea id="noteInput" rows="4" placeholder="引き継ぎや注意点"></textarea>
            </label>

            <section class="guideBox">
              <h3>クリック指導</h3>
              <p id="guideText"></p>
              <ol id="guideSteps"></ol>
            </section>

            <section class="paths">
              <h3>参照</h3>
              <a id="steeringLink" href="#">state.md</a>
              <code id="featurePath"></code>
            </section>

            <div class="formActions">
              <button id="saveButton" type="submit">保存</button>
            </div>
          </form>
        </aside>
      </section>

      <section id="treeView" class="treeView" hidden>
        <section class="treeTablePanel" aria-label="実装進捗表">
          <div class="treeTableHeader">
            <div>
              <p id="treeScope" class="eyebrow"></p>
              <h2>LV1 / LV2 / LV3 機能階層</h2>
            </div>
          </div>
          <div class="tableScroller">
            <table class="progressTable">
              <thead>
                <tr>
                  <th rowspan="2">階層</th>
                  <th rowspan="2">英語名</th>
                  <th rowspan="2">日本語名</th>
                  <th rowspan="2">機能ID</th>
                  <th rowspan="2">担当者</th>
                  <th colspan="11">実装進捗</th>
                  <th rowspan="2">状態</th>
                </tr>
                <tr>
                  <th>phase0</th>
                  <th>phase1</th>
                  <th>phase2</th>
                  <th>phase3</th>
                  <th>phase4</th>
                  <th>phase5</th>
                  <th>phase6</th>
                  <th>phase7</th>
                  <th>phase8</th>
                  <th>phase9</th>
                  <th>phase10</th>
                </tr>
              </thead>
              <tbody id="treeTableBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="./structure-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
